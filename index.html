<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Focus Timer">

<style>
  :root{
    --serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,Georgia,"Times New Roman",serif;
    /* Light (default) - editorial coral + indigo */
    --page:#fb5a6a; --deco-1:#2e1a6b; --deco-2:#a7d9ee;
    --card:#ffffff; --card-brd:rgba(38,22,80,0.08);
    --txt:#271a5e; --muted:#8e88ac;
    --navy:#2e1a6b; --blue:#4fa9de;
    --g1:#2e1a6b; --g2:#4fa9de;
    --track:#ececf5; --chip:#f4f3fa; --chip-brd:rgba(38,22,80,0.07);
    --chip-active:#2e1a6b; --danger:#e8253f;
    --shadow:0 26px 64px rgba(30,16,64,.30);
    --deco-1-op:.20; --deco-2-op:.55;
  }
  :root[data-theme="dark"]{
    --page:#171132; --deco-1:#fb5a6a; --deco-2:#3b6ea5;
    --card:#221b4c; --card-brd:rgba(255,255,255,0.10);
    --txt:#f4f2ff; --muted:#a7a1cd;
    --navy:#fb5a6a; --blue:#7fb4ff;
    --g1:#fb5a6a; --g2:#7fb4ff;
    --track:rgba(255,255,255,0.12); --chip:rgba(255,255,255,0.07); --chip-brd:rgba(255,255,255,0.12);
    --chip-active:#fb5a6a; --danger:#ff6b7d;
    --shadow:0 26px 64px rgba(0,0,0,.5);
    --deco-1-op:.30; --deco-2-op:.30;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--page);
    min-height:100dvh; display:flex; align-items:center; justify-content:center;
    padding:24px; padding:max(24px,env(safe-area-inset-top)) 24px max(24px,env(safe-area-inset-bottom));
    -webkit-tap-highlight-color:transparent; overflow-x:hidden;
  }
  /* decorative editorial shapes */
  .deco{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none}
  .deco span{position:absolute;display:block}
  .deco .c1{width:52vmax;height:52vmax;border-radius:50%;background:var(--deco-1);opacity:var(--deco-1-op);left:-16vmax;top:-14vmax}
  .deco .c2{width:44vmax;height:44vmax;border-radius:46% 46% 8% 8%;background:var(--deco-2);opacity:var(--deco-2-op);right:-10vmax;bottom:-16vmax}
  .deco .c3{width:9px;height:9px;border-radius:50%;background:var(--deco-1);opacity:.5;left:16%;top:24%}
  .deco .c4{width:14px;height:14px;border:2px solid var(--card);opacity:.5;border-radius:50%;right:18%;top:18%}

  .app{width:100%; max-width:440px; position:relative; z-index:1}
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px}
  .brand{display:flex; align-items:center; gap:11px; color:#fff}
  .brand .logo{width:34px;height:34px;border-radius:11px;background:var(--navy);
    display:grid;place-items:center;box-shadow:0 8px 20px rgba(46,26,107,.5)}
  .brand .logo svg{width:19px;height:19px}
  .brand .name{font-family:var(--serif);font-weight:700;font-size:21px;letter-spacing:.3px;color:#fff}
  .iconbtn{background:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.6);color:var(--navy);
    width:42px;height:42px;border-radius:13px;cursor:pointer;display:grid;place-items:center;transition:.15s}
  :root[data-theme="dark"] .iconbtn{background:var(--chip);border-color:var(--chip-brd);color:var(--txt)}
  .iconbtn:hover{transform:translateY(-1px)}
  .iconbtn svg{width:20px;height:20px}

  .card{background:var(--card);border:1px solid var(--card-brd);border-radius:28px;
    padding:24px 22px 22px;box-shadow:var(--shadow)}

  .tagline{text-align:center;color:var(--muted);font-size:11px;font-weight:700;
    letter-spacing:3.5px;text-transform:uppercase;margin:2px 0 6px}

  .dial{position:relative;width:262px;height:262px;margin:8px auto 4px}
  .dial svg{width:100%;height:100%;transform:rotate(-90deg)}
  .dial .track{fill:none;stroke:var(--track);stroke-width:13}
  .dial .prog{fill:none;stroke:url(#grad);stroke-width:13;stroke-linecap:round;
    transition:stroke-dashoffset .25s linear}
  #grad .gs1{stop-color:var(--g1)} #grad .gs2{stop-color:var(--g2)}
  .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
  #time{font-variant-numeric:tabular-nums;font-weight:750;font-size:58px;line-height:1;letter-spacing:1px;color:var(--txt)}
  #time.small{font-size:45px}
  #label{color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;min-height:15px}
  .center.finished #time{color:var(--danger)}

  .presets{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0 6px}
  .chip{display:inline-flex;align-items:center;gap:7px;background:var(--chip);border:1px solid var(--chip-brd);
    color:var(--txt);padding:8px 13px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
  .chip .pdot{width:8px;height:8px;border-radius:50%;background:var(--pc,#ccc);flex:none}
  .chip:hover{transform:translateY(-1px)}
  .chip.active{background:var(--chip-active);border-color:transparent;color:#fff;box-shadow:0 8px 18px rgba(46,26,107,.35)}
  .chip.active .pdot{background:#fff}

  .custom{display:flex;align-items:flex-end;justify-content:center;gap:6px;margin:14px 0 4px}
  .custom input{width:58px;background:var(--chip);border:1px solid var(--chip-brd);color:var(--txt);
    text-align:center;font-size:18px;font-weight:700;padding:10px 6px;border-radius:13px;font-variant-numeric:tabular-nums}
  .custom input:focus{outline:2px solid var(--navy);outline-offset:1px}
  .custom .sep{font-weight:800;color:var(--muted);padding-bottom:10px}
  .custom button{background:var(--chip);border:1px solid var(--chip-brd);color:var(--txt);
    padding:10px 15px;border-radius:13px;font-weight:700;cursor:pointer}
  .custom label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:block;text-align:center;margin-bottom:4px}
  .field{display:flex;flex-direction:column;align-items:center}

  .controls{display:grid;grid-template-columns:1fr auto auto;gap:10px;margin-top:18px}
  .btn{border:none;border-radius:16px;font-size:16px;font-weight:750;cursor:pointer;padding:16px;transition:.15s;color:#fff}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--navy);box-shadow:0 12px 26px rgba(46,26,107,.4)}
  :root[data-theme="dark"] .btn.primary{box-shadow:0 12px 26px rgba(251,90,106,.4)}
  .btn.ghost{background:var(--chip);color:var(--txt);border:1px solid var(--chip-brd);padding:16px 18px}
  .btn[disabled]{opacity:.45;cursor:not-allowed;box-shadow:none}

  .options{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
  .toggle{display:flex;align-items:center;gap:7px;background:var(--chip);border:1px solid var(--chip-brd);
    padding:7px 12px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--muted);user-select:none}
  .toggle.on{color:var(--txt);border-color:var(--navy)}
  .toggle .dot{width:9px;height:9px;border-radius:50%;background:var(--track);transition:.15s}
  .toggle.on .dot{background:#2fc5b6;box-shadow:0 0 8px #2fc5b6}

  .hint{margin-top:16px;color:var(--muted);font-size:11.5px;text-align:center;line-height:1.7}
  .hint kbd{background:var(--chip);border:1px solid var(--chip-brd);border-radius:6px;padding:1px 6px;font-size:11px;font-family:inherit}

  .overlay{position:fixed;inset:0;background:rgba(24,14,50,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    display:none;align-items:center;justify-content:center;padding:24px;z-index:20}
  .overlay.show{display:flex;animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:var(--card);border:1px solid var(--card-brd);border-radius:26px;padding:30px 28px;text-align:center;
    max-width:340px;width:100%;box-shadow:var(--shadow)}
  .modal h2{font-family:var(--serif);margin:.2em 0 .1em;font-size:28px;color:var(--txt)}
  .modal p{color:var(--muted);margin:.2em 0 1.2em}
  .modal .big{font-size:52px;margin-bottom:6px}
  .modal .row{display:flex;gap:10px}
  .modal .row .btn{flex:1;font-size:15px;padding:14px}

  body.flash{animation:flashbg .5s ease 6}
  @keyframes flashbg{0%,100%{background:var(--page)}50%{background:var(--danger)}}

  @media (max-width:420px){
    #time{font-size:50px} #time.small{font-size:39px}
    .dial{width:232px;height:232px}
  }
</style>
</head>
<body>
  <div class="deco" aria-hidden="true"><span class="c1"></span><span class="c2"></span><span class="c3"></span><span class="c4"></span></div>

  <main class="app">
    <div class="topbar">
      <div class="brand">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
            <circle cx="12" cy="13" r="8"></circle><path d="M12 13V9"></path><path d="M9 2h6"></path>
          </svg>
        </span>
        <span class="name">Focus Timer</span>
      </div>
      <button class="iconbtn" id="themeBtn" title="Toggle light / dark" aria-label="Toggle theme">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
      </button>
    </div>

    <section class="card">
      <div class="tagline">The time is yours</div>
      <div class="dial">
        <svg viewBox="0 0 240 240">
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" class="gs1"></stop>
              <stop offset="1" class="gs2"></stop>
            </linearGradient>
          </defs>
          <circle class="track" cx="120" cy="120" r="110"></circle>
          <circle class="prog" id="prog" cx="120" cy="120" r="110"></circle>
        </svg>
        <div class="center" id="center">
          <div id="time">25:00</div>
          <div id="label">Pomodoro</div>
        </div>
      </div>

      <div class="presets" id="presets"></div>

      <div class="custom">
        <div class="field"><label>Hrs</label><input id="inH" type="number" min="0" max="99" inputmode="numeric" value="0"></div>
        <span class="sep">:</span>
        <div class="field"><label>Min</label><input id="inM" type="number" min="0" max="59" inputmode="numeric" value="25"></div>
        <span class="sep">:</span>
        <div class="field"><label>Sec</label><input id="inS" type="number" min="0" max="59" inputmode="numeric" value="0"></div>
        <div class="field"><label>&nbsp;</label><button id="setBtn">Set</button></div>
      </div>

      <div class="controls">
        <button class="btn primary" id="startBtn">Start</button>
        <button class="btn ghost" id="addBtn" title="Add one minute">+1:00</button>
        <button class="btn ghost" id="resetBtn" title="Reset">Reset</button>
      </div>

      <div class="options">
        <div class="toggle on" id="tSound"><span class="dot"></span>Sound</div>
        <div class="toggle" id="tNotify"><span class="dot"></span>Notify</div>
        <div class="toggle" id="tRepeat"><span class="dot"></span>Repeat</div>
        <div class="toggle" id="tAwake"><span class="dot"></span>Keep awake</div>
      </div>

      <p class="hint">
        <kbd>Space</kbd> start / pause &nbsp;·&nbsp; <kbd>R</kbd> reset &nbsp;·&nbsp; <kbd>+</kbd> add minute &nbsp;·&nbsp; <kbd>F</kbd> fullscreen<br>
        Runs fully offline. Install it from your browser menu to keep it one tap away.
      </p>
    </section>
  </main>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="big">⏰</div>
      <h2>Time's up!</h2>
      <p id="doneLabel">Your timer finished.</p>
      <div class="row">
        <button class="btn ghost" id="dismissBtn">Dismiss</button>
        <button class="btn primary" id="againBtn">Restart</button>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };

  var store = {
    get:function(k,d){ try{ var v=localStorage.getItem(k); return v===null?d:JSON.parse(v);}catch(e){return d;} },
    set:function(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
  };

  /* ---------- theme ---------- */
  var root = document.documentElement;
  function applyTheme(t){
    root.setAttribute("data-theme", t);
    $("themeIcon").innerHTML = t==="dark"
      ? '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"></path>'
      : '<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"></path>';
    document.querySelector('meta[name=theme-color]').setAttribute('content', t==="dark" ? "#171132" : "#fb5a6a");
  }
  var theme = store.get("ft_theme", "light");
  applyTheme(theme);
  $("themeBtn").onclick = function(){ theme = theme==="dark"?"light":"dark"; store.set("ft_theme",theme); applyTheme(theme); };

  /* ---------- toggles ---------- */
  var opt = {
    sound: store.get("ft_sound", true),
    notify: store.get("ft_notify", false),
    repeat: store.get("ft_repeat", false),
    awake: store.get("ft_awake", false)
  };
  function bindToggle(id,key,onChange){
    var el=$(id);
    function render(){ el.classList.toggle("on", !!opt[key]); }
    render();
    el.onclick=function(){ opt[key]=!opt[key]; store.set("ft_"+key,opt[key]); render(); if(onChange) onChange(); };
    return render;
  }
  bindToggle("tSound","sound");
  bindToggle("tRepeat","repeat");
  bindToggle("tAwake","awake",function(){ if(opt.awake && running) requestWake(); else releaseWake(); });
  bindToggle("tNotify","notify",function(){
    if(opt.notify && "Notification" in window && Notification.permission==="default"){ Notification.requestPermission(); }
  });

  /* ---------- presets ---------- */
  var PRESETS = [
    {label:"Pomodoro", s:25*60, c:"#2e1a6b"}, {label:"Break", s:5*60, c:"#2fc5b6"}, {label:"Long break", s:15*60, c:"#7bc24a"},
    {label:"1 min", s:60, c:"#f3c24c"}, {label:"3 min", s:3*60, c:"#56b4e6"}, {label:"10 min", s:10*60, c:"#9b7be0"},
    {label:"45 min", s:45*60, c:"#fb5a6a"}, {label:"1 hour", s:60*60, c:"#4fa9de"}
  ];
  var presetWrap = $("presets");
  PRESETS.forEach(function(p){
    var b=document.createElement("button");
    b.className="chip"; b.dataset.s=p.s; b.style.setProperty("--pc", p.c);
    b.innerHTML='<span class="pdot"></span>'+p.label;
    b.onclick=function(){ setDuration(p.s*1000, p.label); markPreset(p.s); };
    presetWrap.appendChild(b);
  });
  function markPreset(s){
    Array.prototype.forEach.call(presetWrap.children,function(c){
      c.classList.toggle("active", Number(c.dataset.s)===s);
    });
  }

  /* ---------- timer state ---------- */
  var CIRC = 2*Math.PI*110;
  $("prog").style.strokeDasharray = CIRC;
  var durationMs = 25*60*1000;
  var remainingMs = durationMs;
  var endTime = 0;
  var running = false;
  var finished = false;
  var raf = null;
  var curLabel = "Pomodoro";

  function fmt(ms){
    if(ms<0) ms=0;
    var t=Math.round(ms/1000);
    var h=Math.floor(t/3600), m=Math.floor((t%3600)/60), s=t%60;
    var pad=function(n){return (n<10?"0":"")+n;};
    return h>0 ? (h+":"+pad(m)+":"+pad(s)) : (pad(m)+":"+pad(s));
  }
  function render(){
    var rem = running ? (endTime - Date.now()) : remainingMs;
    if(rem<0) rem=0;
    var txt = fmt(rem);
    var timeEl=$("time");
    timeEl.textContent = txt;
    timeEl.classList.toggle("small", txt.length>5);
    var frac = durationMs>0 ? rem/durationMs : 0;
    $("prog").style.strokeDashoffset = CIRC*(1-frac);
    document.title = (running||rem<remainingMs) && rem>0 ? ("⏳ "+txt+" · Focus Timer")
                    : finished ? "✅ Done · Focus Timer" : "Focus Timer";
  }
  function setDuration(ms, label){
    stopLoop(); running=false; finished=false;
    durationMs = Math.max(1000, ms);
    remainingMs = durationMs;
    curLabel = label || "Timer";
    $("label").textContent = curLabel;
    $("center").classList.remove("finished");
    $("startBtn").textContent = "Start";
    var t=Math.round(durationMs/1000);
    $("inH").value=Math.floor(t/3600); $("inM").value=Math.floor((t%3600)/60); $("inS").value=t%60;
    render();
  }

  function tick(){
    if(!running) return;
    var rem = endTime - Date.now();
    render();
    if(rem<=0){ complete(); return; }
    raf = requestAnimationFrame(tick);
  }
  function stopLoop(){ if(raf){ cancelAnimationFrame(raf); raf=null; } }

  function start(){
    if(running) return;
    if(remainingMs<=0){ remainingMs=durationMs; }
    finished=false; $("center").classList.remove("finished");
    endTime = Date.now()+remainingMs;
    running=true; $("startBtn").textContent="Pause";
    if(opt.awake) requestWake();
    unlockAudio();
    if(opt.notify && "Notification" in window && Notification.permission==="default") Notification.requestPermission();
    stopLoop(); tick();
  }
  function pause(){
    if(!running) return;
    remainingMs = endTime - Date.now();
    if(remainingMs<0) remainingMs=0;
    running=false; $("startBtn").textContent="Resume";
    stopLoop(); releaseWake(); render();
  }
  function toggle(){ running?pause():start(); }
  function reset(){
    stopLoop(); running=false; finished=false;
    remainingMs=durationMs; $("startBtn").textContent="Start";
    $("center").classList.remove("finished"); releaseWake(); render();
  }
  function addMinute(){
    durationMs += 60000;
    if(running) endTime += 60000; else remainingMs += 60000;
    if(finished){ finished=false; $("center").classList.remove("finished"); $("startBtn").textContent="Start"; remainingMs=durationMs; }
    render();
  }
  function complete(){
    stopLoop(); running=false; finished=true; remainingMs=0;
    $("startBtn").textContent="Start";
    $("center").classList.add("finished");
    render(); releaseWake();
    document.body.classList.add("flash");
    setTimeout(function(){ document.body.classList.remove("flash"); }, 3000);
    if(navigator.vibrate) navigator.vibrate([200,120,200,120,300]);
    if(opt.sound) startAlarm();
    if(opt.notify && "Notification" in window && Notification.permission==="granted"){
      try{ new Notification("⏰ Time's up!", {body:curLabel+" finished.", tag:"focus-timer", renotify:true}); }catch(e){}
    }
    $("doneLabel").textContent = curLabel + " finished.";
    $("overlay").classList.add("show");
    if(opt.repeat){
      setTimeout(function(){ if(finished){ closeOverlay(); remainingMs=durationMs; start(); } }, 1500);
    }
  }

  function closeOverlay(){ $("overlay").classList.remove("show"); stopAlarm(); }
  $("dismissBtn").onclick=function(){ closeOverlay(); reset(); };
  $("againBtn").onclick=function(){ closeOverlay(); remainingMs=durationMs; start(); };
  $("overlay").addEventListener("click",function(e){ if(e.target===$("overlay")){ closeOverlay(); } });

  $("startBtn").onclick=toggle;
  $("resetBtn").onclick=reset;
  $("addBtn").onclick=addMinute;
  $("setBtn").onclick=applyCustom;
  function applyCustom(){
    var h=Math.max(0,Math.min(99, parseInt($("inH").value,10)||0));
    var m=Math.max(0,Math.min(59, parseInt($("inM").value,10)||0));
    var s=Math.max(0,Math.min(59, parseInt($("inS").value,10)||0));
    var total=(h*3600+m*60+s)*1000;
    if(total<1000){ total=1000; }
    setDuration(total, "Custom");
    markPreset(-1);
  }
  ["inH","inM","inS"].forEach(function(id){
    $(id).addEventListener("keydown",function(e){ if(e.key==="Enter"){ applyCustom(); } });
  });

  document.addEventListener("keydown",function(e){
    var tag=(e.target.tagName||"").toLowerCase();
    if(tag==="input"||tag==="textarea") return;
    if(e.code==="Space"){ e.preventDefault(); if($("overlay").classList.contains("show")){closeOverlay();reset();} else toggle(); }
    else if(e.key==="r"||e.key==="R"){ reset(); }
    else if(e.key==="+"||e.key==="="){ addMinute(); }
    else if(e.key==="f"||e.key==="F"){ toggleFullscreen(); }
    else if(e.key==="Escape" && $("overlay").classList.contains("show")){ closeOverlay(); reset(); }
  });
  function toggleFullscreen(){
    if(!document.fullscreenElement){ if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(function(){}); }
    else if(document.exitFullscreen){ document.exitFullscreen(); }
  }

  var wakeLock=null;
  function requestWake(){
    if(!("wakeLock" in navigator)) return;
    navigator.wakeLock.request("screen").then(function(w){ wakeLock=w; }).catch(function(){});
  }
  function releaseWake(){ if(wakeLock){ try{wakeLock.release();}catch(e){} wakeLock=null; } }
  document.addEventListener("visibilitychange",function(){
    if(document.visibilityState==="visible"){ if(running && opt.awake) requestWake(); render(); }
  });

  var actx=null, alarmTimer=null;
  function unlockAudio(){
    try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==="suspended") actx.resume(); }catch(e){}
  }
  function beep(freq, start, dur){
    if(!actx) return;
    var o=actx.createOscillator(), g=actx.createGain();
    o.type="sine"; o.frequency.value=freq;
    o.connect(g); g.connect(actx.destination);
    var t=actx.currentTime+start;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.5,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.02);
  }
  function chime(){
    unlockAudio();
    beep(880,0,0.18); beep(1174,0.20,0.18); beep(1568,0.40,0.30);
  }
  function startAlarm(){
    chime();
    stopAlarm();
    var count=0;
    alarmTimer=setInterval(function(){ count++; chime(); if(count>=8) stopAlarm(); }, 1400);
  }
  function stopAlarm(){ if(alarmTimer){ clearInterval(alarmTimer); alarmTimer=null; } }

  markPreset(25*60);
  render();
  window.addEventListener("beforeunload",function(e){ if(running){ e.preventDefault(); e.returnValue=""; } });

  if("serviceWorker" in navigator){
    window.addEventListener("load",function(){
      navigator.serviceWorker.register("sw.js").catch(function(){});
    });
  }
})();
</script>
